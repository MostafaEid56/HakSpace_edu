version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hakspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
  backend:
    build: .
    ports: ["8080:8080"]
    depends_on: [db]
    environment:
      DB_HOST: db
      DB_NAME: hakspace
      DB_USER: postgres
      DB_PASS: password
      JWT_SECRET: c2VjdXJlLWtleS1mb3ItaGFrc3BhY2UtMjAyNC1hbmQtYmV5b25kLXN1cGVyLWxvbmcta2V5LTMyLWJ5dGVz