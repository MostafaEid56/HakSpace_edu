# D:\HacSpaceWebsite\docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    container_name: hakspace-db
    environment:
      POSTGRES_DB: hakspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./hakspace-backend
      dockerfile: Dockerfile
    container_name: hakspace-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hakspace
      DB_USER: postgres
      DB_PASS: password
      JWT_SECRET: c2VjdXJlLWtleS1mb3ItaGFrc3BhY2UtMjAyNC1hbmQtYmV5b25kLXN1cGVyLWxvbmcta2V5LTMyLWJ5dGVz

  frontend:
    build:
      context: ./hakspace-frontend
      dockerfile: Dockerfile
    container_name: hakspace-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api

volumes:
  pgdata: